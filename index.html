<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Mod 模板生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="./global.css" rel="stylesheet">
</head>
<body>
    <h1>Fabric Mod 模板生成器</h1>
    
    <div class="card">
        <div class="version-info">
            <strong>默认版本：</strong> <span id="defaultVersions">加载中...</span>
        </div>
        
        <div class="form-group">
            <label>Mod 名称 (name)</label>
            <label for="modName"></label><input type="text" id="modName" value="My Fabric Mod" placeholder="显示名称">
        </div>
        
        <div class="form-group">
            <label>Mod ID (id)</label>
            <label for="modId"></label><input type="text" id="modId" value="my-fabric-mod" placeholder="唯一标识符">
        </div>
        
        <div class="form-group">
            <label>作者 (author)</label>
            <label for="author"></label><input type="text" id="author" value="YourName" placeholder="作者名称">
        </div>
        
        <div class="form-group">
            <label>Java 包名 (package name)</label>
            <label for="packageName"></label><input type="text" id="packageName" value="com.example.mymod" placeholder="例如：com.example.mymod">
        </div>
    </div>
    
    <div class="card">
        <div class="card-title">版本设置</div>
        
        <div class="row">
            <div class="form-group">
                <label>Minecraft 版本</label>
                <label for="minecraftVersion"></label><select id="minecraftVersion">
                    <option value="26.1">26.1</option>
                    <option value="1.21.11">1.21.11</option>
                    <option value="1.21.10">1.21.10</option>
                    <option value="1.21.9">1.21.9</option>
                    <option value="1.21.8">1.21.8</option>
                    <option value="1.21.7">1.21.7</option>
                    <option value="1.21.6">1.21.6</option>
                    <option value="1.21.5">1.21.5</option>
                    <option value="1.21.4">1.21.4</option>
                    <option value="1.21.3">1.21.3</option>
                    <option value="1.21.2">1.21.2</option>
                    <option value="1.21.1">1.21.1</option>
                    <option value="1.21">1.21</option>
                    <option value="1.20.4" selected>1.20.4</option>
                    <option value="1.20.2">1.20.2</option>
                    <option value="1.20.1">1.20.1</option>
                    <option value="1.19.4">1.19.4</option>
                    <option value="1.19.3">1.19.3</option>
                    <option value="1.18.2">1.18.2</option>
                    <option value="1.17.1">1.17.1</option>
                    <option value="1.16.5">1.16.5</option>
                    <option value="1.15.2">1.15.2</option>
                    <option value="1.14.4">1.14.4</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fabric Loader</label>
                <label for="loaderVersion"></label><select id="loaderVersion">
                    <option value="0.15.11" selected>0.15.11</option>
                    <option value="0.15.10">0.15.10</option>
                    <option value="0.15.9">0.15.9</option>
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>映射版本 (Yarn)</label>
                <label for="yarnVersion"></label><select id="yarnVersion">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fabric API</label>
                <label for="apiVersion"></label><select id="apiVersion">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>映射类型 (Mappings)</label>
            <label for="mappingType"></label><select id="mappingType">
                <option value="yarn" selected>Yarn (推荐)</option>
                <option value="mojang">Mojang</option>
            </select>
        </div>
    </div>
    
    <div class="card">
        <div class="card-title">高级选项</div>
        
        <div class="form-group checkbox-group">
            <input type="checkbox" id="enableDataGen">
            <label for="enableDataGen">启用数据生成 (Data Generation)</label>
        </div>
        
        <div class="form-group checkbox-group">
            <input type="checkbox" id="separateClientServer" checked>
            <label for="separateClientServer">分离客户端/服务端代码</label>
        </div>
    </div>
    
    <div class="card">
        <div class="form-group">
            <label>描述</label>
            <label for="description"></label><input type="text" id="description" value="A Fabric mod" placeholder="Mod 描述">
        </div>
        
        <button id="generateBtn" onclick="generateTemplate()">生成模板</button>
        
        <div id="status"></div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
